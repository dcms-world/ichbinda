name = "sicherda"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# D1 Datenbank
[[d1_databases]]
binding = "DB"
database_name = "sicherda-db"
database_id = "c54a724e-f0b7-43fd-b000-61bac9d1a242"

# Cron-Job für Überfälligkeits-Check
[[triggers]]
cron = "*/5 * * * *" # Alle 5 Minuten

# Environment Variables (Secrets via wrangler secret)
[vars]
# EXPO_ACCESS_TOKEN = "" # Via wrangler secret put EXPO_ACCESS_TOKEN
# API_KEYS = ""          # Via wrangler secret put API_KEYS (comma/newline separated)
